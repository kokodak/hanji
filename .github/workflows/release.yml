name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-15
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0." >&2
            exit 1
          fi

          version="${tag#v}"
          manifest_version="$(
            awk '
              /^\[workspace\.package\]/ {
                in_workspace_package = 1
                next
              }
              /^\[/ {
                in_workspace_package = 0
              }
              in_workspace_package && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"

          if [ "$version" != "$manifest_version" ]; then
            echo "Tag version $version does not match Cargo.toml workspace version $manifest_version." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show Rust toolchain
        shell: bash
        run: |
          rustc --version
          cargo --version

      - name: Verify Metal toolchain availability
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version
          xcrun --find metal || true

          if ! xcrun --find metal >/dev/null 2>&1; then
            echo "Metal compiler (metal) is not available on this runner." >&2
            echo "Use a macOS runner image with full Xcode/Metal installed." >&2
            exit 1
          fi

      - name: Test core crates
        run: make test

      - name: Check GPUI app
        run: make check-app

      - name: Package macOS DMG
        run: make package-macos VERSION="${{ steps.release.outputs.version }}"

      - name: Prepare release notes
        run: scripts/extract-changelog-section.sh "${{ steps.release.outputs.version }}" > release-notes.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Hanji-${{ steps.release.outputs.version }}-macos
          path: |
            dist/Hanji-${{ steps.release.outputs.version }}-macos-*.dmg
            dist/Hanji-${{ steps.release.outputs.version }}-macos-*.dmg.sha256
            release-notes.md
          if-no-files-found: error
